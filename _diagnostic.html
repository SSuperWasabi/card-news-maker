<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PNG 다운로드 진단</title>
<script src="html2canvas.min.js"></script>
<style>
  body { font-family: monospace; margin: 24px; background:#fafafa; color:#0a0a0a; }
  #log { white-space: pre-wrap; font-size: 14px; line-height: 1.6; background:#fff; border:1px solid #ccc; padding:16px; margin-top:16px; }
  .err { color:#c00; font-weight:bold; }
  .ok  { color:#080; font-weight:bold; }
  button { font-size:16px; padding:12px 20px; margin-right:8px; cursor:pointer; }
  #target { width:300px; height:120px; background:#0a0a0a; color:#fafafa; display:flex; align-items:center; justify-content:center; font-size:24px; margin-top:16px; }
  #preview { margin-top:16px; max-width:320px; border:1px solid #ccc; }
</style>
</head>
<body>
  <h2>PNG 다운로드 진단</h2>
  <button onclick="runTest()">▶ 테스트 실행</button>
  <button onclick="location.reload()">↻ 새로고침</button>

  <div id="target">TEST CARD</div>
  <div id="log"></div>
  <img id="preview" alt="">

<script>
  const logEl = document.getElementById('log');
  function log(msg, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    logEl.appendChild(line);
  }

  // step 0: is html2canvas present at page load?
  window.addEventListener('load', () => {
    if (typeof html2canvas === 'undefined') {
      log('✗ STEP 0 실패 — html2canvas 가 로드되지 않음 (html2canvas.min.js 못 찾음)', 'err');
      log('   → 이 HTML 과 같은 폴더에 html2canvas.min.js 가 있는지 확인하세요.', 'err');
    } else {
      log('✓ STEP 0 — html2canvas 로드됨 (버전 ' + (html2canvas.version || '?') + ')', 'ok');
      log('  테스트 실행 버튼을 눌러주세요.');
    }
  });

  async function runTest() {
    logEl.innerHTML = '';
    try {
      log('STEP 1 — html2canvas 확인…');
      if (typeof html2canvas === 'undefined') { log('✗ html2canvas 없음. 여기서 중단.', 'err'); return; }
      log('✓ STEP 1 — html2canvas 사용 가능', 'ok');

      log('STEP 2 — 폰트 대기…');
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      log('✓ STEP 2 — 폰트 준비됨', 'ok');

      log('STEP 3 — 카드 렌더링(html2canvas)…');
      const canvas = await html2canvas(document.getElementById('target'), { scale: 1, logging: false });
      log('✓ STEP 3 — 캔버스 생성됨: ' + canvas.width + '×' + canvas.height, 'ok');

      log('STEP 4 — toBlob 변환…');
      const blob = await new Promise((res, rej) =>
        canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob 가 null 반환')), 'image/png'));
      log('✓ STEP 4 — blob 생성됨: ' + Math.round(blob.size/1024) + ' KB', 'ok');

      log('STEP 5 — 미리보기 표시…');
      const url = URL.createObjectURL(blob);
      document.getElementById('preview').src = url;
      log('✓ STEP 5 — 아래에 이미지가 보이면 렌더링은 정상', 'ok');

      log('STEP 6 — 다운로드 트리거(a.click)…');
      const a = document.createElement('a');
      a.href = url; a.download = 'diagnostic-test.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      log('✓ STEP 6 — 다운로드 트리거 완료 (다운로드 폴더에 diagnostic-test.png 확인)', 'ok');
      log('');
      log('모든 단계 통과. 다운로드 폴더에 파일이 있으면 정상,', 'ok');
      log('없으면 STEP 6 의 a.click() 이 브라우저에 막힌 것입니다.', 'ok');
    } catch (e) {
      log('✗ 예외 발생: ' + e.message, 'err');
      log('  스택: ' + (e.stack || '없음'), 'err');
    }
  }
</script>
</body>
</html>
