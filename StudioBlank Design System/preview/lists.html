<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 0; }
  .row { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #F4F4F5; font: 400 14px Inter; color: var(--sb-fg-1); }
  .row:last-child { border-bottom: none; }
  .row.hover { background: #F4F4F5; }
  .row.active { background: #0A0A0A; color: #FAFAFA; }
  .meta { font: var(--sb-text-mono); font-size: 11px; color: var(--sb-fg-2); }
  .row.active .meta { color: rgba(250,250,250,.65); }
</style></head>
<body><div class="card">
  <div class="row"><span>2024 · Northern Series</span><span class="meta">24 items</span></div>
  <div class="row hover"><span>2023 · Stones</span><span class="meta">11 items</span></div>
  <div class="row active"><span>2022 · Selected Works</span><span class="meta">18 items</span></div>
  <div class="row"><span>Archive</span><span class="meta">214 items</span></div>
  <div class="row"><span>Unpublished</span><span class="meta">3 items</span></div>
</div></body></html>
