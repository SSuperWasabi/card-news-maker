<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 32px; }
  .row { display: grid; grid-template-columns: 92px 1fr 80px; gap: 16px; align-items: center; padding: 8px 0; }
  .tok { font: var(--sb-text-mono); color: var(--sb-fg-2); font-size: 12px; }
  .px  { font: var(--sb-text-mono); color: var(--sb-fg-1); font-size: 12px; text-align: right; }
  .bar { background: var(--sb-ink); height: 14px; }
</style></head>
<body><div class="card">
  <div class="row"><div class="tok">space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 px</div></div>
  <div class="row"><div class="tok">space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 px</div></div>
  <div class="row"><div class="tok">space-3</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 px</div></div>
  <div class="row"><div class="tok">space-4</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 px</div></div>
  <div class="row"><div class="tok">space-5</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 px</div></div>
  <div class="row"><div class="tok">space-6</div><div><div class="bar" style="width:64px"></div></div><div class="px">64 px</div></div>
  <div class="row"><div class="tok">space-8</div><div><div class="bar" style="width:96px"></div></div><div class="px">96 px</div></div>
  <div class="row"><div class="tok">space-10</div><div><div class="bar" style="width:128px"></div></div><div class="px">128 px</div></div>
</div></body></html>
