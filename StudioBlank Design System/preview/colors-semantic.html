<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; padding: 0; border: none; background: transparent; }
  .swatch { aspect-ratio: 1 / 1; display: flex; flex-direction: column; justify-content: space-between; padding: 14px; border: 1px solid var(--sb-border); border-right: none; color: #fff; }
  .swatch:last-child { border-right: 1px solid var(--sb-border); }
  .tag { font: var(--sb-text-eyebrow); letter-spacing: 0.14em; text-transform: uppercase; }
  .name { font: var(--sb-text-body-sm); font-weight: 500; }
  .hex  { font: var(--sb-text-mono); font-size: 11px; opacity: 0.8; margin-top: 4px; }
</style></head>
<body><div class="card">
  <div class="swatch" style="background:#16A34A">
    <div class="tag">Success</div>
    <div><div class="name">Upload complete</div><div class="hex">#16A34A</div></div>
  </div>
  <div class="swatch" style="background:#CA8A04">
    <div class="tag">Warning</div>
    <div><div class="name">Storage low</div><div class="hex">#CA8A04</div></div>
  </div>
  <div class="swatch" style="background:#DC2626">
    <div class="tag">Error</div>
    <div><div class="name">Validation</div><div class="hex">#DC2626</div></div>
  </div>
  <div class="swatch" style="background:#71717A">
    <div class="tag">Info</div>
    <div><div class="name">Notes</div><div class="hex">#71717A</div></div>
  </div>
</div></body></html>
