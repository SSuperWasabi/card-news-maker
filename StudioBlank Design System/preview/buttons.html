<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 32px; }
  .btn { font-family: Inter; font-weight: 500; border-radius: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background-color 160ms, color 160ms; }
  .primary   { background:#0A0A0A; color:#FAFAFA; border: none; }
  .secondary { background: transparent; color:#0A0A0A; border: 1px solid #0A0A0A; }
  .ghost     { background: transparent; color:#0A0A0A; border: none; }
  .destructive { background:#DC2626; color:#FAFAFA; border: none; }
  .disabled  { opacity: 0.3; cursor: not-allowed; }
  .sm { height: 32px; padding: 0 16px; font-size: 12px; min-width: 64px; }
  .md { height: 40px; padding: 0 24px; font-size: 14px; min-width: 96px; }
  .lg { height: 48px; padding: 0 32px; font-size: 16px; min-width: 128px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { font: var(--sb-text-eyebrow); letter-spacing:.14em; text-transform: uppercase; color: var(--sb-fg-2); margin-bottom: 12px; }
  .group + .group { margin-top: 24px; }
</style></head>
<body><div class="card">
  <div class="group">
    <div class="label">Variants · medium</div>
    <div class="row">
      <button class="btn primary md">View Project</button>
      <button class="btn secondary md">Download</button>
      <button class="btn ghost md">Cancel</button>
      <button class="btn destructive md">Delete</button>
      <button class="btn primary md disabled">Disabled</button>
    </div>
  </div>
  <div class="group">
    <div class="label">Sizes</div>
    <div class="row">
      <button class="btn primary sm">Small</button>
      <button class="btn primary md">Medium</button>
      <button class="btn primary lg">Large</button>
    </div>
  </div>
</div></body></html>
