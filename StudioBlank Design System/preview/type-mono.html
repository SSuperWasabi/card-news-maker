<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 40px 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; }
  .big { font: 400 56px/1 "IBM Plex Mono"; color: var(--sb-fg-1); letter-spacing: -0.02em; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .meta { font: var(--sb-text-mono); font-size: 11px; color: var(--sb-fg-2); }
  pre { margin: 0; font: 400 13px/1.5 "IBM Plex Mono"; color: var(--sb-fg-1); background: var(--sb-stone-50); padding: 14px 16px; border: 1px solid var(--sb-border); white-space: pre; }
</style></head>
<body><div class="card">
  <div>
    <div class="big">IBM/01</div>
    <div class="meta" style="margin-top:8px">IBM Plex Mono · captions, EXIF, code</div>
  </div>
  <div class="row">
    <pre>f/2.8  1/250s  ISO 400
35mm · Tri-X 400
2024-03-11  Reykjavík</pre>
  </div>
</div></body></html>
