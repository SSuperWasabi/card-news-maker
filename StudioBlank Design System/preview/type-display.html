<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 40px 36px; }
  .row { display: grid; grid-template-columns: 88px 1fr; gap: 24px; align-items: baseline; padding: 18px 0; border-bottom: 1px solid var(--sb-divider); }
  .row:last-child { border-bottom: none; }
  .meta { font: var(--sb-text-mono); font-size: 11px; color: var(--sb-fg-2); padding-top: 6px; }
  .specimen { letter-spacing: -0.02em; color: var(--sb-fg-1); }
</style></head>
<body><div class="card">
  <div class="row"><div class="meta">Hero · 64/700</div><div class="specimen" style="font:700 48px/1.05 Inter">Whitespace.</div></div>
  <div class="row"><div class="meta">H1 · 40/700</div>  <div class="specimen" style="font:700 36px/1.1 Inter">Selected Works</div></div>
  <div class="row"><div class="meta">H2 · 28/600</div>  <div class="specimen" style="font:600 26px/1.2 Inter">Recent Exhibitions</div></div>
  <div class="row"><div class="meta">H3 · 20/600</div>  <div class="specimen" style="font:600 20px/1.3 Inter">Untitled, 2024</div></div>
</div></body></html>
