<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 40px 36px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; align-items: end; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .spec { font: 600 64px/1 Inter; color: var(--sb-fg-1); letter-spacing: -0.04em; }
  .meta { font: var(--sb-text-mono); font-size: 11px; color: var(--sb-fg-2); }
  .name { font: var(--sb-text-body-sm); color: var(--sb-fg-1); font-weight: 500; }
</style></head>
<body><div class="card">
  <div class="col"><div class="spec" style="font-weight:300">Aa</div><div class="name">Light</div><div class="meta">Inter 300</div></div>
  <div class="col"><div class="spec" style="font-weight:400">Aa</div><div class="name">Regular</div><div class="meta">Inter 400</div></div>
  <div class="col"><div class="spec" style="font-weight:600">Aa</div><div class="name">Semibold</div><div class="meta">Inter 600</div></div>
  <div class="col"><div class="spec" style="font-weight:700">Aa</div><div class="name">Bold</div><div class="meta">Inter 700</div></div>
</div></body></html>
