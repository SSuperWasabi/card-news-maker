<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0; padding: 0; border: none; background: transparent; }
  .swatch { aspect-ratio: 1 / 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; border: 1px solid var(--sb-border); border-right: none; }
  .swatch:last-child { border-right: 1px solid var(--sb-border); }
  .swatch .name { font: var(--sb-text-body-sm); font-weight: 500; color: inherit; }
  .swatch .hex  { font: var(--sb-text-mono); font-size: 11px; opacity: 0.7; margin-top: 4px; }
</style></head>
<body><div class="card">
  <div class="swatch" style="background: #0A0A0A; color: #FAFAFA;">
    <div class="name">Ink</div><div class="hex">#0A0A0A</div>
  </div>
  <div class="swatch" style="background: #FAFAFA; color: #0A0A0A;">
    <div class="name">Paper</div><div class="hex">#FAFAFA</div>
  </div>
  <div class="swatch" style="background: #D4D4D8; color: #0A0A0A;">
    <div class="name">Stone 200</div><div class="hex">#D4D4D8</div>
  </div>
  <div class="swatch" style="background: #FFFFFF; color: #0A0A0A;">
    <div class="name">White</div><div class="hex">#FFFFFF</div>
  </div>
</div></body></html>
