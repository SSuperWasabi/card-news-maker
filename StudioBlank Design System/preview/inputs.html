<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px 24px; }
  .field label { font: var(--sb-text-eyebrow); letter-spacing:.14em; text-transform: uppercase; color: var(--sb-fg-2); display: block; margin-bottom: 8px; }
  .input { height: 40px; width: 100%; box-sizing: border-box; background:#fff; border: 1px solid var(--sb-stone-200); padding: 0 12px; font: 400 14px Inter; color: var(--sb-fg-1); border-radius: 0; outline: none; }
  .input::placeholder { color: var(--sb-stone-300); }
  .input.focus { border: 2px solid var(--sb-ink); padding: 0 11px; }
  .input.error { border-color: var(--sb-error); }
  .input.disabled { background: var(--sb-stone-50); border-color: var(--sb-stone-100); color: var(--sb-stone-300); }
  .help { font: var(--sb-text-caption); color: var(--sb-fg-2); margin-top: 6px; }
  .help.error { color: var(--sb-error); }
</style></head>
<body><div class="card">
  <div class="field">
    <label>Default</label>
    <input class="input" placeholder="Untitled project">
  </div>
  <div class="field">
    <label>Focus</label>
    <input class="input focus" value="Reykjavík, March 2024">
  </div>
  <div class="field">
    <label>Error</label>
    <input class="input error" value="not-an-email">
    <div class="help error">Enter a valid email address.</div>
  </div>
  <div class="field">
    <label>Disabled</label>
    <input class="input disabled" value="Read only" disabled>
  </div>
</div></body></html>
