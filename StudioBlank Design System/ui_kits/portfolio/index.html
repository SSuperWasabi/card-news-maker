<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>studioblank — Portfolio UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #FAFAFA; color: #0A0A0A; font-family: Inter, sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="Gallery.jsx"></script>
  <script type="text/babel" src="ProjectDetail.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [route, setRoute] = useState("work");
      const [project, setProject] = useState(null);

      const navigate = (r) => { setProject(null); setRoute(r); };
      const openProject = (p) => { setProject(p); setRoute("project"); };

      let screen;
      if (route === "project" && project)        screen = <ProjectDetail project={project} onBack={() => navigate("work")} />;
      else if (route === "about")                screen = <About />;
      else if (route === "contact")              screen = <Contact />;
      else if (route === "journal")              screen = <ComingSoon title="Journal" subtitle="Quarterly notes from the studio. Returning Spring 2025." />;
      else if (route === "series")               screen = <ComingSoon title="Series" subtitle="Long-form, themed editions. In progress." />;
      else                                       screen = <Gallery onOpenProject={openProject} />;

      return (
        <div>
          <Header route={route === "project" ? "work" : route} onNav={navigate} />
          {screen}
          <Footer />
        </div>
      );
    }

    function ComingSoon({ title, subtitle }) {
      return (
        <section style={{ padding: "192px 64px", textAlign: "center", background: "#FAFAFA" }}>
          <Eyebrow style={{ marginBottom: 32 }}>In Progress</Eyebrow>
          <h1 style={{ font: "700 64px/1.05 Inter", letterSpacing: "-0.04em", margin: 0, color: "#0A0A0A" }}>{title}</h1>
          <p style={{ font: "300 18px Inter", color: "#71717A", marginTop: 24, maxWidth: 540, marginLeft: "auto", marginRight: "auto" }}>{subtitle}</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
